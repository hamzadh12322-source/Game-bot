app = "game-top-up-bot"
primary_region = "fra"

[build]

[env]
  DB_PATH = "/data/database.db"
  PORT = "8080"

[mounts]
  source = "bot_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
